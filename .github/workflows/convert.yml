name: Convert Models to CoreML

on:
  # Trigger automatically when model files are pushed to models/
  push:
    paths:
      - 'models/**/*.pth'
      - 'models/**/*.safetensors'

  # Allow manually triggering with a specific model file
  workflow_dispatch:
    inputs:
      model_file:
        description: 'Path to model file in models/ folder (e.g. 4xLSDIR.pth)'
        required: false
        default: ''
      tile_size:
        description: 'Tile size (default: 512)'
        required: false
        default: '512'

jobs:
  convert:
    # macOS is required — coremltools only fully works on macOS
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Fetch LFS objects
        run: |
          git lfs pull
          echo "--- models/ contents ---"
          ls -lh models/ || echo "(empty)"
          echo "--- LFS status ---"
          git lfs status

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Find models to convert
        id: find_models
        run: |
          mkdir -p output
          if [ -n "${{ github.event.inputs.model_file }}" ]; then
            # Manual trigger: accept just filename OR full path (e.g. "4xLSDIR.pth" or "models/4xLSDIR.pth")
            model_input="${{ github.event.inputs.model_file }}"
            [[ "$model_input" != models/* ]] && model_input="models/${model_input}"
            echo "models=${model_input}" >> $GITHUB_OUTPUT
            echo "Manual conversion: ${model_input}"
          else
            # Auto trigger: scan models/ for any .pth or .safetensors without a
            # corresponding .mlpackage.zip in output/ (i.e. not yet converted).
            # This is more reliable than git diff on shallow clones with LFS.
            model_list=""
            for f in models/*.pth models/*.safetensors; do
              [ -f "$f" ] || continue
              basename=$(basename "$f" .pth)
              basename="${basename%.safetensors}"
              zip="output/${basename}.mlpackage.zip"
              if [ ! -f "$zip" ]; then
                model_list="${model_list}${f},"
              fi
            done
            echo "models=$model_list" >> $GITHUB_OUTPUT
            echo "Pending conversions: $model_list"
          fi

      - name: Convert and zip models
        run: |
          tile_size="${{ github.event.inputs.tile_size || '512' }}"
          mkdir -p output

          IFS=',' read -ra model_list <<< "${{ steps.find_models.outputs.models }}"
          any_failed=0

          for model_file in "${model_list[@]}"; do
            [ -z "$model_file" ] && continue
            [ ! -f "$model_file" ] && echo "File not found: $model_file" && continue

            basename=$(basename "$model_file" .pth)
            basename="${basename%.safetensors}"
            output_path="output/${basename}.mlpackage"
            zip_path="output/${basename}.mlpackage.zip"

            echo "Converting: $model_file -> $output_path"
            python convert.py \
              --model "$model_file" \
              --output "$output_path" \
              --tile-size "$tile_size" \
              --mlprogram || { any_failed=1; continue; }

            # .mlpackage is a directory — zip it so it can be served as a single download URL
            echo "Zipping: $output_path -> $zip_path"
            cd output
            zip -r "${basename}.mlpackage.zip" "${basename}.mlpackage"
            cd ..
            rm -rf "$output_path"
          done

          exit $any_failed

      - name: Upload converted models as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coreml-models
          path: output/
          retention-days: 90
          if-no-files-found: warn

      - name: Commit converted models back to repo (optional)
        if: success() && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "ci: Add converted CoreML models [skip ci]"
          git push
